const log = document.getElementById('log');
function addLog(msg, cls='') {
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

async function seedAll() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Insertando...';
  log.innerHTML = '';
  addLog(`🚀 Iniciando inserción de ${cities.length} ciudades...`, 'info');

  // Get existing city names to skip duplicates
  const { data: existing } = await db.from('cities').select('city_name');
  const existingNames = new Set((existing || []).map(c => c.city_name.toLowerCase()));
  addLog(`ℹ️ ${existingNames.size} ciudades ya existentes en la BD`, 'info');

  let ok = 0, skipped = 0, errors = 0;

  for (const city of cities) {
    if (existingNames.has(city.city_name.toLowerCase())) {
      addLog(`⏭️  SKIP: ${city.city_name} (ya existe)`, 'info');
      skipped++;
      continue;
    }
    const { error } = await db.from('cities').insert(city);
    if (error) {
      addLog(`❌ ERROR: ${city.city_name} — ${error.message}`, 'err');
      errors++;
    } else {
      addLog(`✅ OK: ${city.city_name} (${city.country})`, 'ok');
      ok++;
    }
    await new Promise(r => setTimeout(r, 80));
  }

  addLog('', '');
  addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  addLog(`✅ Insertadas: ${ok}  |  ⏭️ Saltadas: ${skipped}  |  ❌ Errores: ${errors}`, ok > 0 ? 'ok' : 'err');
  addLog(`🎉 ¡Proceso completado! Ve a la app principal y verifica la base de datos.`, 'ok');
  btn.textContent = '✅ Completado';
}
